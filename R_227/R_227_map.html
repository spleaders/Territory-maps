<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>R_227 Territory Map</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f0f0; }
#header {
  background: #1A3A6B; color: white;
  padding: 10px 16px; display: flex;
  align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 4px; height: 50px; box-sizing: border-box;
}
#header h1 { font-size: 17px; font-weight: bold; }
#header .stats { font-size: 12px; opacity: 0.9; }
#map { height: calc(100vh - 90px); width: 100%; display: block; }
.leaflet-popup-content-wrapper {
  border-radius: 12px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.3);
  border-left: 6px solid #1A3A6B;
  padding: 0;
}
.leaflet-popup-content { margin: 0; width: 360px !important; }
.popup-inner { padding: 18px 22px; }
.popup-mapid {
  font-size: 14px; color: #888; text-transform: uppercase;
  letter-spacing: 1px; margin-bottom: 4px;
}
.popup-site {
  font-size: 20px; font-weight: bold; color: #1A3A6B;
  margin-bottom: 7px; line-height: 1.3;
}
.popup-owner { font-size: 17px; color: #222; margin-bottom: 4px; }
.popup-mail { font-size: 17px; color: #555; margin-bottom: 10px; }
.popup-badge {
  display: inline-block; padding: 5px 12px; border-radius: 10px;
  font-size: 14px; font-weight: bold; color: white; margin-right: 4px;
}
.badge-owner  { background: #1A3A6B; }
.badge-vacant { background: #808080; }
.badge-inst   { background: #548235; }
.badge-biz    { background: #7B2D8B; }
.badge-dnc    { background: #cc0000; }
.badge-research { background: #E65100; }
#legend {
  position: absolute; bottom: 24px; right: 10px; z-index: 1000;
  background: white; border-radius: 12px; padding: 16px 22px;
  box-shadow: 0 2px 16px rgba(0,0,0,0.2); font-size: 17px;
  min-width: 224px; cursor: move; user-select: none;
}
#legend h4 {
  font-size: 18px; margin-bottom: 12px; color: #333;
  border-bottom: 2px solid #eee; padding-bottom: 6px;
}
#legend-close {
  float: right; cursor: pointer; font-size: 16px; color: #aaa;
}
#legend-close:hover { color: #333; }
.legend-row { display: flex; align-items: center; margin-bottom: 10px; }
.legend-swatch {
  width: 21px; height: 21px; border-radius: 4px;
  margin-right: 12px; flex-shrink: 0; border: 1px solid rgba(0,0,0,0.2);
}
#notes-bar {
  display: none; position: absolute; top: 58px; left: 10px;
  right: 10px; z-index: 1000;
  background: #FFF8E1; border-left: 4px solid #F5A623;
  border-radius: 6px; padding: 8px 12px;
  font-size: 12px; color: #555; max-width: 500px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
#tab-bar {
  display: flex; background: #1A3A6B;
  padding: 0 12px; height: 40px; box-sizing: border-box;
}
.tab-btn {
  padding: 8px 20px; cursor: pointer; color: rgba(255,255,255,0.7);
  font-size: 13px; font-weight: bold; border: none;
  background: transparent; border-bottom: 3px solid transparent;
}
.tab-btn.active {
  color: white; border-bottom: 3px solid white;
}

#table-view {
  display: none; height: calc(100vh - 90px);
  overflow-x: scroll; overflow-y: auto; padding: 16px; background: #f5f5f5;
}
#table-view::-webkit-scrollbar {
  height: 12px; width: 12px;
}
#table-view::-webkit-scrollbar-track {
  background: #ddd; border-radius: 6px;
}
#table-view::-webkit-scrollbar-thumb {
  background: #888; border-radius: 6px;
}
#table-view::-webkit-scrollbar-thumb:hover {
  background: #555;
}

#search-box {
  width: 100%; max-width: 400px; padding: 8px 12px;
  border: 1px solid #ccc; border-radius: 6px;
  font-size: 14px; margin-bottom: 12px;
}
#data-table {
  width: 1480px; border-collapse: collapse;
  table-layout: fixed;
  background: white; font-size: 13px;
}
#table-wrapper {
  display: block; overflow-x: auto;
  border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}
#data-table th {
  background: #1A3A6B; color: white;
  padding: 10px 12px; text-align: left;
  cursor: pointer; white-space: nowrap;
  user-select: none; position: sticky;
  top: 0; z-index: 10; min-width: 60px;
}
#data-table th:hover { opacity: 0.85; }
#data-table th.sort-asc::after { content: " "; font-size: 10px; }
#data-table th.sort-desc::after { content: " "; font-size: 10px; }
#data-table td {
  padding: 8px 12px; border-bottom: 1px solid #eee;
  vertical-align: top; white-space: nowrap;
  overflow: hidden; text-overflow: ellipsis;
  max-width: 0;
}
#data-table td:hover {
  white-space: normal; overflow: visible;
  background: #fffde7; position: relative; z-index: 5;
}
#data-table th {
  position: sticky; top: 0; z-index: 10;
  resize: horizontal; overflow: auto;
  min-width: 40px;
}
#data-table tr:hover td { background: #f0f4ff; }
.badge-res   { background: #1A3A6B; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.badge-biz2  { background: #7B2D8B; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.badge-inst2 { background: #548235; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.badge-vac2  { background: #808080; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.badge-dnc2  { background: #cc0000; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
.badge-res2  { background: #E65100; color: white; padding: 2px 8px; border-radius: 10px; font-size: 11px; }
#share-btn {
  position: absolute; top: 10px; right: 10px; z-index: 1000;
  background: rgba(255,255,255,0.95); border: 1px solid #ccc;
  border-radius: 8px; padding: 7px 14px;
  font-size: 13px; font-weight: bold; color: #333;
  cursor: pointer; box-shadow: 0 2px 8px rgba(0,0,0,0.15);
}
#share-btn:hover { background: #f0f0f0; }
</style>
</head>

function getPopup(p) {
  var badge = '';
  if (p.dnc === 'YES') badge = '<span class="popup-badge badge-dnc">DO NOT CONTACT</span>';
  else if (p.sheet === 'Institutions') badge = '<span class="popup-badge badge-inst">' + p.btype + '</span>';
  else if (p.sheet === 'Vacant') badge = '<span class="popup-badge badge-vacant">Vacant</span>';
  else if (p.btype === 'Commercial / Rental') badge = '<span class="popup-badge badge-biz">Business</span>';
  else if (p.occupied === 'Yes') badge = '<span class="popup-badge badge-owner">Owner Occupied</span>';
  if (p.research === 'Yes') badge += '<span class="popup-badge badge-research">Research Needed</span>';

  var mailHtml = p.mail ? '<div class="popup-mail"> ' + p.mail + '</div>' : '';
  var saluteHtml = p.salute && p.salute !== 'nan' ? '<div class="popup-mail" style="color:#888">Salutation: ' + p.salute + '</div>' : '';

  return '<div class="popup-inner">' +
    '<div class="popup-mapid">Parcel #' + p.mapid + '</div>' +
    '<div class="popup-site">' + p.site + '</div>' +
    '<div class="popup-owner">' + p.owner + '</div>' +
    mailHtml + saluteHtml +
    '<div style="margin-top:6px">' + badge + '</div>' +
    '</div>';
}

function getParcelArea(feature) {
  var coords = feature.geometry.coordinates;
  var allPoints = [];
  function collectPoints(c) {
    if (typeof c[0] === 'number') { allPoints.push(c); }
    else { c.forEach(collectPoints); }
  }
  collectPoints(coords);
  if (allPoints.length < 2) return 0;
  var lats = allPoints.map(function(p) { return p[1]; });
  var lngs = allPoints.map(function(p) { return p[0]; });
  return (Math.max.apply(null,lats)-Math.min.apply(null,lats)) * (Math.max.apply(null,lngs)-Math.min.apply(null,lngs));
}
function getOpacity(feature) {
  var area = getParcelArea(feature);
  if (area < 0.000005) return 0.55;
  if (area < 0.00005)  return 0.40;
  if (area < 0.0002)   return 0.25;
  return 0.15;
}
L.geoJSON(parcelsData, {
  style: function(feature) {
    var p = feature.properties;
    return {
      fillColor: p.fill,
      fillOpacity: getOpacity(feature),
      color: 'rgba(0,0,0,0.5)',
      weight: 1.5
    };
  },
  onEachFeature: function(feature, layer) {
    var p = feature.properties;
    layer.bindPopup(getPopup(p), {maxWidth: 300});
    layer.bindTooltip(String(p.mapid), {
      permanent: true, direction: 'center',
      className: 'mapid-label',
      offset: [0, 0]
    });
  }
}).addTo(map);

if (!boundaryData) {
  map.setView([43.77, -88.43], 14);
}

// Scale MapID labels with zoom level
function updateLabelSizes() {
  var z = map.getZoom();
  var size;
  if      (z <= 13) size = '11px';
  else if (z <= 14) size = '15px';
  else if (z <= 15) size = '19px';
  else if (z <= 16) size = '24px';
  else              size = '30px';
  document.querySelectorAll('.mapid-label').forEach(function(el) {
    el.style.fontSize = size;
  });
}
map.on('zoomend', updateLabelSizes);
map.on('load', updateLabelSizes);
setTimeout(updateLabelSizes, 500);

<script>function getBadge(p){if(p.dnc==='YES')return '<span class=badge-dnc2>DNC</span>';if(p.sheet==='Institutions')return '<span class=badge-inst2>Institution</span>';if(p.sheet==='Vacant')return '<span class=badge-vac2>Vacant</span>';if(p.btype==='Commercial / Rental')return '<span class=badge-biz2>Business</span>';if(p.research==='Yes')return '<span class=badge-res2>Research</span>';return '<span class=badge-res>Residential</span>';}function showTab(tab){document.getElementById('map').style.display=tab==='map'?'block':'none';document.getElementById('table-view').style.display=tab==='table'?'block':'none';if(tab==='map'){setTimeout(function(){map.invalidateSize();},100);}document.querySelectorAll('.tab-btn').forEach(function(b,i){b.classList.toggle('active',(tab==='map'&&i===0)||(tab==='table'&&i===1));});if(tab==='table'&&!window._tableBuilt){buildTable();window._tableBuilt=true;}}var _sortDir={};function sortTable(col){if(!window._tableRows)return;var rows=window._tableRows.slice();var dir=_sortDir[col]=!_sortDir[col];rows.sort(function(a,b){var x=a[col],y=b[col];if(typeof x==='number')return dir?x-y:y-x;return dir?String(x).localeCompare(String(y)):String(y).localeCompare(String(x));});window._tableRows=rows;document.querySelectorAll('#data-table th').forEach(function(th,i){th.classList.remove('sort-asc','sort-desc');if(i===col)th.classList.add(dir?'sort-asc':'sort-desc');});renderTable(rows);}var _hideUnknown=false;function toggleUnknown(){_hideUnknown=!_hideUnknown;document.getElementById('hide-unknown-btn').style.background=_hideUnknown?'#e0e0e0':'white';filterTable();}function filterTable(){var q=document.getElementById('search-box').value.toLowerCase();if(!window._tableRows)return;var filtered=window._tableRows.filter(function(r){if(_hideUnknown&&r[1]==='Unknown Owner')return false;return r.join(' ').toLowerCase().indexOf(q)>=0;});renderTable(filtered);}function buildTable(){var rows=[];parcelsData.features.forEach(function(f){var p=f.properties;rows.push([p.mapid,p.owner||'',p.owner2||'',p.site||'',p.mail||'',p.city||'',p.state||'',p.zip||'',p.btype||'',p.ownertype||'',p.occupied||'',p.confidence||'',p.addressas||'',p.salute||'',p.dnc==='YES'?'YES':'',p.research==='Yes'?'Yes':'',p.notes||'',p.sheet||'',]);});rows.sort(function(a,b){return a[0]-b[0];});window._tableRows=rows;renderTable(rows);}function renderTable(rows){var tbody=document.getElementById('table-body');tbody.innerHTML='';rows.forEach(function(r){var tr=document.createElement('tr');if(r[14]==='YES')tr.style.background='#fff0f0';tr.innerHTML='<td>'+r[0]+'</td>'+'<td>'+r[1]+'</td>'+'<td>'+r[2]+'</td>'+'<td>'+r[3]+'</td>'+'<td>'+r[4]+'</td>'+'<td>'+r[5]+'</td>'+'<td>'+r[6]+'</td>'+'<td>'+r[7]+'</td>'+'<td>'+r[8]+'</td>'+'<td>'+r[9]+'</td>'+'<td>'+r[10]+'</td>'+'<td>'+r[11]+'</td>'+'<td>'+r[12]+'</td>'+'<td>'+r[13]+'</td>'+'<td>'+r[14]+'</td>'+'<td>'+r[15]+'</td>'+'<td>'+r[16]+'</td>'+'<td>'+r[17]+'</td>';tbody.appendChild(tr);});}var legend=document.getElementById('legend');var dragging=false,ox=0,oy=0;legend.addEventListener('mousedown',function(e){if(e.target.id==='legend-close')return;dragging=true;ox=e.clientX-legend.getBoundingClientRect().left;oy=e.clientY-legend.getBoundingClientRect().top;legend.style.right='auto';legend.style.bottom='auto';e.preventDefault();});document.addEventListener('mousemove',function(e){if(!dragging)return;legend.style.left=(e.clientX-ox)+'px';legend.style.top=(e.clientY-oy)+'px';});document.addEventListener('mouseup',function(){dragging=false;});function shareTerritory(){var s=encodeURIComponent('R_227 Territory Map');var b=encodeURIComponent('Hello,\n\nHere is the link for the R_227 territory:\n\nhttps://spleaders.github.io/Territory-Maps-and-MailLists/R_227/\n\nThis link opens a page with two buttons:\n- Open Interactive Map\n- Open Mailing List\n\nWorks on any device or browser - no software needed.\n\nThank you!');window.location.href='mailto:?subject='+s+'&body='+b;}</script></body>
