<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Apartment_500 Territory</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #f0f4f8;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center; padding: 20px; }
.card { background: white; border-radius: 16px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.12);
  padding: 40px 32px; max-width: 420px; width: 100%; text-align: center; }
.territory-name { font-size: 28px; font-weight: bold; color: #4CAF50; margin-bottom: 6px; }
.subtitle { font-size: 14px; color: #888; margin-bottom: 36px; }
.btn { display: block; width: 100%; padding: 16px; border-radius: 10px;
  font-size: 17px; font-weight: bold; text-decoration: none;
  margin-bottom: 16px; transition: opacity 0.2s; }
.btn:hover { opacity: 0.85; }
.btn-map { background: #4CAF50; color: white; }
.icon { margin-right: 8px; }
.footer { margin-top: 24px; font-size: 12px; color: #bbb; }

</head>

<div class="card">
  <div class="territory-name">Apartment_500 Territory</div>
  <div class="subtitle">Fond du Lac &amp; Dodge County</div>
  <a class="btn btn-map" href="Apartment_500_map.html">
    <span class="icon">&#x1F5FA;</span> Open Interactive Map
  </a>
