function getPopup(p) {
  var badge = '';
  if (p.dnc === 'YES') badge = '<span class="popup-badge badge-dnc">DO NOT CONTACT</span>';
  else if (p.sheet === 'Institutions') badge = '<span class="popup-badge badge-inst">' + p.btype + '</span>';
  else if (p.sheet === 'Vacant') badge = '<span class="popup-badge badge-vacant">Vacant</span>';
  else if (p.btype === 'Commercial / Rental') badge = '<span class="popup-badge badge-biz">Business</span>';
  else if (p.occupied === 'Yes') badge = '<span class="popup-badge badge-owner">Owner Occupied</span>';
  if (p.research === 'Yes') badge += '<span class="popup-badge badge-research">Research Needed</span>';

  var mailHtml = p.mail ? '<div class="popup-mail"> ' + p.mail + '</div>' : '';
  var saluteHtml = p.salute && p.salute !== 'nan' ? '<div class="popup-mail" style="color:#888">Salutation: ' + p.salute + '</div>' : '';

  return '<div class="popup-inner">' +
    '<div class="popup-mapid">Parcel #' + p.mapid + '</div>' +
    '<div class="popup-site">' + p.site + '</div>' +
    '<div class="popup-owner">' + p.owner + '</div>' +
    mailHtml + saluteHtml +
    '<div style="margin-top:6px">' + badge + '</div>' +
    '</div>';
}

function getParcelArea(feature) {
  var coords = feature.geometry.coordinates;
  var allPoints = [];
  function collectPoints(c) {
    if (typeof c[0] === 'number') { allPoints.push(c); }
    else { c.forEach(collectPoints); }
  }
  collectPoints(coords);
  if (allPoints.length < 2) return 0;
  var lats = allPoints.map(function(p) { return p[1]; });
  var lngs = allPoints.map(function(p) { return p[0]; });
  return (Math.max.apply(null,lats)-Math.min.apply(null,lats)) * (Math.max.apply(null,lngs)-Math.min.apply(null,lngs));
}
function getOpacity(feature) {
  var area = getParcelArea(feature);
  if (area < 0.000005) return 0.35;
  if (area < 0.00005)  return 0.25;
  if (area < 0.0002)   return 0.18;
  return 0.12;
}
// Store per-parcel area for label sizing
var parcelAreas = {};
parcelsData.features.forEach(function(f) {
  parcelAreas[f.properties.mapid] = getParcelArea(f);
});

L.geoJSON(parcelsData, {
  style: function(feature) {
    var p = feature.properties;
    return {
      fillColor: p.fill,
      fillOpacity: getOpacity(feature),
      color: 'rgba(0,0,0,0.65)',
      weight: 2.0
    };
  },
  onEachFeature: function(feature, layer) {
    var p = feature.properties;
    layer.bindPopup(getPopup(p), {maxWidth: 300});
    var area = getParcelArea(feature);
    // Store area on tooltip element for zoom-aware sizing
    var tt = layer.bindTooltip(String(p.mapid), {
      permanent: true, direction: 'center',
      className: 'mapid-label',
      offset: [0, 0]
    });
    layer.on('tooltipopen', function(e) {
      e.tooltip.getElement().setAttribute('data-area', area);
    });
  }
}).addTo(map);

if (!boundaryData) {
  map.setView([43.77, -88.43], 14);
}

// Scale MapID labels by zoom level AND parcel area
function updateLabelSizes() {
  var z = map.getZoom();
  // Base size from zoom
  var baseSize;
  if      (z <= 13) baseSize = 11;
  else if (z <= 14) baseSize = 15;
  else if (z <= 15) baseSize = 19;
  else if (z <= 16) baseSize = 24;
  else              baseSize = 30;
  document.querySelectorAll('.mapid-label').forEach(function(el) {
    var area = parseFloat(el.getAttribute('data-area') || 0);
    var scale = 1.0;
    // Shrink labels for small parcels
    if      (area < 0.000003) scale = 0.45;
    else if (area < 0.000008) scale = 0.60;
    else if (area < 0.00002)  scale = 0.75;
    else if (area < 0.00006)  scale = 0.88;
    var finalSize = Math.max(7, Math.round(baseSize * scale));
    el.style.fontSize = finalSize + 'px';
  });
}
map.on('zoomend', updateLabelSizes);
map.on('load', updateLabelSizes);
setTimeout(updateLabelSizes, 500);
</script>

function _colHdr(){return '<div class=ml-col-header><span>MapID</span><span>Owner 1</span><span>Owner 2</span><span>Site Address</span><span>St</span><span>Reason/Notes</span><span>Mailing Address</span></div>';}
function _row(p,cls){
var sa=(p.site||'')+(p.site_city?', '+p.site_city:'');
var ma=(p.mail||'')+(p.city?', '+p.city:'')+(p.state?' '+p.state:'')+(p.zip?' '+p.zip:'');
return '<div class="ml-row '+cls+'">'
+'<span>'+p.mapid+'</span>'
+'<span>'+(p.owner||'')+'</span>'
+'<span>'+(p.owner2||'')+'</span>'
+'<span>'+sa+'</span>'
+'<span>'+(p.site_state||'')+'</span>'
+'<span>'+(p.notes||'')+'</span>'
+'<span>'+ma+'</span>'
+'</div>';}
function buildTable(){_allRows=tableData.slice();renderTable(_allRows);}
function filterTable(){
var q=document.getElementById('search-box').value.toLowerCase();
renderTable(_allRows.filter(function(p){
return [p.mapid,p.owner,p.owner2,p.site,p.site_city,p.mail,p.city,p.notes].join(' ').toLowerCase().indexOf(q)>=0;}));}
function renderTable(rows){
var conf=[],res=[],dnc=[];
rows.forEach(function(p){
if(p.dnc==='YES'){dnc.push(p);}
else if(p.occupied==='Yes'&&p.confidence==='High'&&p.research!=='Yes'){conf.push(p);}
else{res.push(p);}});
var h='';
h+='<div class=ml-hdr style="background:#375623">✔ CONFIDENT RESIDENTS ('+conf.length+' parcels) — Ready to write letters</div>';
h+=_colHdr();
conf.forEach(function(p,i){h+=_row(p,i%2===0?'ml-even-g':'ml-odd');});
if(!conf.length)h+='<div class=ml-none>None</div>';
h+='<div class=ml-gap></div>';
h+='<div class=ml-hdr style="background:#7F6000">? NEEDS RESEARCH ('+res.length+' parcels) — Verify before writing</div>';
h+=_colHdr();
res.forEach(function(p,i){h+=_row(p,i%2===0?'ml-even-y':'ml-odd');});
if(!res.length)h+='<div class=ml-none>None</div>';
h+='<div class=ml-gap></div>';
h+='<div class=ml-hdr style="background:#C00000">✘ DO NOT CALL ('+dnc.length+' parcels)</div>';
h+=_colHdr();
dnc.forEach(function(p){h+=_row(p,'ml-dnc');});
if(!dnc.length)h+='<div class=ml-none>None</div>';
document.getElementById('table-body').innerHTML=h;}
function showTab(tab){
document.getElementById('map').style.display=tab==='map'?'block':'none';
document.getElementById('table-view').style.display=tab==='table'?'block':'none';
if(tab==='map'){setTimeout(function(){map.invalidateSize();},100);}
document.querySelectorAll('.tab-btn').forEach(function(b,i){
b.classList.toggle('active',(tab==='map'&&i===0)||(tab==='table'&&i===1));});
if(tab==='table'&&!window._tableBuilt){buildTable();window._tableBuilt=true;}}
var legend=document.getElementById('legend');var dragging=false,ox=0,oy=0;legend.addEventListener('mousedown',function(e){if(e.target.id==='legend-close')return;dragging=true;ox=e.clientX-legend.getBoundingClientRect().left;oy=e.clientY-legend.getBoundingClientRect().top;legend.style.right='auto';legend.style.bottom='auto';e.preventDefault();});document.addEventListener('mousemove',function(e){if(!dragging)return;legend.style.left=(e.clientX-ox)+'px';legend.style.top=(e.clientY-oy)+'px';});document.addEventListener('mouseup',function(){dragging=false;});function shareTerritory(){var s=encodeURIComponent('Town_29 Territory Map');var b=encodeURIComponent('Hello,\n\nHere is the link for the Town_29 territory:\n\nhttps://spleaders.github.io/Territory-Maps-and-MailLists/Town_29/\n\nThis link opens a page with two buttons:\n- Open Interactive Map\n- Open Mailing List\n\nWorks on any device or browser - no software needed.\n\nThank you!');window.location.href='mailto:?subject='+s+'&body='+b;}function searchMapID(val){var clearBtn=document.getElementById('mapid-search-clear');if(!val){clearBtn.style.display='none';return;}clearBtn.style.display='inline';var id=parseInt(val);if(isNaN(id))return;var found=null;parcelsData.features.forEach(function(f){if(f.properties.mapid===id){found=f;}});if(!found)return;var coords=found.geometry.coordinates;function getCenter(c){var pts=[];function collect(x){if(typeof x[0]==='number')pts.push(x);else x.forEach(collect);}collect(c);var lat=pts.reduce(function(s,p){return s+p[1];},0)/pts.length;var lng=pts.reduce(function(s,p){return s+p[0];},0)/pts.length;return [lat,lng];}var center=getCenter(coords);map.setView(center,17);}function clearMapID(){document.getElementById('mapid-input').value='';document.getElementById('mapid-search-clear').style.display='none';}function printMap(){var c=map.getCenter();var z=map.getZoom();var el=document.getElementById('map');document.getElementById('share-btn').style.display='none';document.getElementById('print-btn').style.display='none';document.getElementById('btn-bar').style.display='none';el.style.position='fixed';el.style.top='0';el.style.left='0';el.style.width='100vw';el.style.height='100vh';el.style.zIndex='9999';map.invalidateSize();map.setView(c,z);setTimeout(function(){map.setView(c,z);requestAnimationFrame(function(){requestAnimationFrame(function(){window.print();});});},800);}window.onafterprint=function(){var el=document.getElementById('map');el.style.position='';el.style.top='';el.style.left='';el.style.width='';el.style.height='';el.style.zIndex='';map.invalidateSize();document.getElementById('share-btn').style.display='';document.getElementById('print-btn').style.display='';document.getElementById('btn-bar').style.display='';};</script></body>
